name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.5.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: release
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python3 - <<'PY'
          from pathlib import Path
          for line in Path("Cargo.toml").read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if line.startswith("version"):
                  print(line.split("=", 1)[1].strip().strip('"'))
                  break
          PY
          )"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [[ "$TAG" != "v${VERSION}" ]]; then
            echo "Release tag $TAG must match Cargo.toml version v${VERSION}" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            script: bash scripts/package-linux.sh dist
          - platform: macos-host
            os: macos-latest
            script: bash scripts/package-macos.sh dist
          - platform: windows-x86_64
            os: windows-latest
            script: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/package-windows.ps1 dist
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ clang libfontconfig-dev libwayland-dev \
            libwebkit2gtk-4.1-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libssl-dev libzstd-dev vulkan-validationlayers libvulkan1
      - name: Regenerate icon assets
        shell: bash
        run: |
          python -m pip install --upgrade pillow
          python scripts/generate_icons.py
      - name: Package
        shell: bash
        if: runner.os != 'Windows'
        run: ${{ matrix.script }}
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\package-windows.ps1 dist
      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/claude_clone-v${{ needs.validate.outputs.version }}-*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum claude_clone-v${{ needs.validate.outputs.version }}-* > ../SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* SHA256SUMS --clobber
          else
            gh release create "$TAG" dist/* SHA256SUMS \
              --title "$TAG" \
              --notes "Claude Clone $TAG"
          fi
